services:
  db:
    image: postgres:16-alpine
    container_name: deepfindtools-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-adops_db}
      POSTGRES_USER: ${DB_USER:-adops_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-your_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-adops_user} -d ${DB_NAME:-adops_db}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    container_name: deepfindtools-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 4173
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-adops_db}
      DB_USER: ${DB_USER:-adops_user}
      DB_PASSWORD: ${DB_PASSWORD:-your_password}
      DB_HOST: db
      DB_PORT: 5432
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    ports:
      - "${APP_PORT:-4173}:4173"

volumes:
  postgres_data:
