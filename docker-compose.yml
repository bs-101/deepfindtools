services:
  mysql:
    image: mysql:8.4
    container_name: deepfindtools-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-adops_db}
      MYSQL_USER: ${DB_USER:-adops_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-your_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u${DB_USER:-adops_user} -p${DB_PASSWORD:-your_password} --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  backend:
    build:
      context: .
      target: backend
    container_name: deepfindtools-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 4173
      DB_ENGINE: ${DB_ENGINE:-django.db.backends.mysql}
      DB_NAME: ${DB_NAME:-adops_db}
      DB_USER: ${DB_USER:-adops_user}
      DB_PASSWORD: ${DB_PASSWORD:-your_password}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env before starting}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://www.deepfindtools.com}
    expose:
      - "4173"
    volumes:
      - logo_cache:/app/data/logo-cache

  frontend:
    build:
      context: .
      target: frontend
      args:
        PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://www.deepfindtools.com}
    container_name: deepfindtools-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_INTERNAL_URL: http://backend:4173
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://www.deepfindtools.com}
      PORT: 3000
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: deepfindtools-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx/cloudflare-local.conf:/etc/nginx/conf.d/default.conf:ro

  collector:
    build:
      context: .
      target: backend
    container_name: deepfindtools-collector
    restart: unless-stopped
    profiles:
      - automation
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_ENGINE: ${DB_ENGINE:-django.db.backends.mysql}
      DB_NAME: ${DB_NAME:-adops_db}
      DB_USER: ${DB_USER:-adops_user}
      DB_PASSWORD: ${DB_PASSWORD:-your_password}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://www.deepfindtools.com}
      CANDIDATE_LIMIT: ${CANDIDATE_LIMIT:-12}
      COLLECT_INTERVAL_SECONDS: ${COLLECT_INTERVAL_SECONDS:-21600}
      PRODUCT_HUNT_TOKEN: ${PRODUCT_HUNT_TOKEN:-}
    command: ["python", "scripts/collect_candidates.py", "--loop"]

volumes:
  mysql_data:
  logo_cache:
