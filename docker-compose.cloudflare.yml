services:
  mysql:
    image: mysql:8.4
    container_name: deepfindtools-local-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-adops_db}
      MYSQL_USER: ${DB_USER:-adops_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-your_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u${DB_USER:-adops_user} -p${DB_PASSWORD:-your_password} --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  backend:
    build:
      context: .
      target: backend
    container_name: deepfindtools-local-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 4173
      DB_ENGINE: ${DB_ENGINE:-django.db.backends.mysql}
      DB_NAME: ${DB_NAME:-adops_db}
      DB_USER: ${DB_USER:-adops_user}
      DB_PASSWORD: ${DB_PASSWORD:-your_password}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env before starting}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://ai.deepfindtools.com}
    expose:
      - "4173"
    volumes:
      - logo_cache:/app/data/logo-cache
      - runtime_data:/app/data/runtime

  frontend:
    build:
      context: .
      target: frontend
      args:
        PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://ai.deepfindtools.com}
    container_name: deepfindtools-local-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_INTERNAL_URL: http://backend:4173
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://ai.deepfindtools.com}
      PORT: 3000
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: deepfindtools-local-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "127.0.0.1:${LOCAL_NGINX_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx/cloudflare-local.conf:/etc/nginx/conf.d/default.conf:ro

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: deepfindtools-local-cloudflared
    restart: unless-stopped
    depends_on:
      - nginx
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    profiles:
      - tunnel

  we-mp-rss:
    image: ghcr.io/rachelos/we-mp-rss:latest
    container_name: deepfindtools-local-we-mp-rss
    restart: unless-stopped
    profiles:
      - wechat
    environment:
      PORT: 8001
      USERNAME: ${WECHAT_RSS_USER:-admin}
      PASSWORD: ${WECHAT_RSS_PASSWORD:-change_this_wechat_rss_password}
      SECRET_KEY: ${WECHAT_RSS_SECRET_KEY:-change_this_long_random_secret}
      ENABLE_JOB: "True"
      WERSS_AUTH_WEB: "True"
      DB: sqlite:///./data/db.db
      RSS_BASE_URL: http://we-mp-rss:8001/
      RSS_LOCAL: "False"
      RSS_FULL_CONTEXT: "False"
      RSS_ADD_COVER: "True"
      RSS_PAGE_SIZE: 100
      MAX_PAGE: 3
      GATHER.CONTENT: "False"
      GATHER.MODEL: web
      GATHER.CONTENT_AUTO_CHECK: "False"
      REDIS_SERVER_ENABLED: "True"
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "127.0.0.1:${WECHAT_RSS_PORT:-8001}:8001"
    volumes:
      - wechat_rss_data:/app/data

  collector:
    build:
      context: .
      target: backend
    container_name: deepfindtools-local-collector
    restart: unless-stopped
    profiles:
      - automation
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_ENGINE: ${DB_ENGINE:-django.db.backends.mysql}
      DB_NAME: ${DB_NAME:-adops_db}
      DB_USER: ${DB_USER:-adops_user}
      DB_PASSWORD: ${DB_PASSWORD:-your_password}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://ai.deepfindtools.com}
      CANDIDATE_LIMIT: ${CANDIDATE_LIMIT:-12}
      COLLECT_INTERVAL_SECONDS: ${COLLECT_INTERVAL_SECONDS:-3600}
      PRODUCT_HUNT_TOKEN: ${PRODUCT_HUNT_TOKEN:-}
      WECHAT_RSS_URL: ${WECHAT_RSS_URL:-http://we-mp-rss:8001/feed/all.json?limit=100}
      WECHAT_ACCOUNT_ALLOWLIST: ${WECHAT_ACCOUNT_ALLOWLIST:-}
      RUNTIME_DIR: /app/data/runtime
    command: ["python", "scripts/collect_candidates.py", "--loop"]
    volumes:
      - runtime_data:/app/data/runtime

  logo-prefetch:
    build:
      context: .
      target: backend
    container_name: deepfindtools-local-logo-prefetch
    profiles:
      - maintenance
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_ENGINE: ${DB_ENGINE:-django.db.backends.mysql}
      DB_NAME: ${DB_NAME:-adops_db}
      DB_USER: ${DB_USER:-adops_user}
      DB_PASSWORD: ${DB_PASSWORD:-your_password}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
    command: ["python", "scripts/prefetch_logos.py", "--limit", "${LOGO_PREFETCH_LIMIT:-260}"]
    volumes:
      - logo_cache:/app/data/logo-cache

  tool-enrich:
    build:
      context: .
      target: backend
    container_name: deepfindtools-local-tool-enrich
    profiles:
      - maintenance
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_ENGINE: ${DB_ENGINE:-django.db.backends.mysql}
      DB_NAME: ${DB_NAME:-adops_db}
      DB_USER: ${DB_USER:-adops_user}
      DB_PASSWORD: ${DB_PASSWORD:-your_password}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
    command: ["python", "scripts/enrich_tool_details.py", "--limit", "${TOOL_ENRICH_LIMIT:-50}"]

volumes:
  mysql_data:
  logo_cache:
  runtime_data:
  wechat_rss_data:
